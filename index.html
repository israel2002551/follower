<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Human Following Robot Control Panel</title>
    <style>
        :root {
            --bg-body: #0f172a;
            --bg-panel: #1e293b;
            --bg-input: #334155;
            --accent: #38bdf8;
            --accent-hover: #0ea5e9;
            --success: #22c55e;
            --danger: #ef4444;
            --warning: #eab308;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-radius: 8px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: var(--bg-panel);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.25rem;
            font-weight: 600;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--danger);
            box-shadow: 0 0 10px var(--danger);
            transition: all 0.3s;
        }

        .dot.connected { background: var(--success); box-shadow: 0 0 10px var(--success); }
        .dot.locking { background: var(--warning); box-shadow: 0 0 10px var(--warning); animation: pulse 1s infinite; }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        main {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 20px;
            padding: 20px;
            max-width: 1600px;
            margin: 0 auto;
            width: 100%;
        }

        .video-container {
            background: #000;
            border-radius: var(--border-radius);
            overflow: hidden;
            position: relative;
            aspect-ratio: 4/3;
            border: 2px solid var(--accent);
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.2);
        }

        #streamView {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .video-overlay {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0,0,0,0.6);
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 0.8rem;
            color: var(--accent);
            font-family: monospace;
        }

        .controls-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .card {
            background: var(--bg-panel);
            padding: 1.5rem;
            border-radius: var(--border-radius);
            border: 1px solid rgba(255,255,255,0.05);
        }

        .card h3 {
            margin-bottom: 1rem;
            font-size: 0.9rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 0.5rem;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        input[type="text"] {
            flex: 1;
            padding: 10px;
            background: var(--bg-input);
            border: 1px solid transparent;
            border-radius: 6px;
            color: white;
            font-size: 0.95rem;
            transition: border 0.2s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--accent);
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary {
            background: var(--accent);
            color: #0f172a;
        }
        .btn-primary:hover { background: var(--accent-hover); }
        .btn-primary:disabled {
            background: var(--bg-input);
            color: var(--text-muted);
            cursor: not-allowed;
        }

        .btn-danger {
            background: var(--danger);
            color: white;
            width: 100%;
            padding: 15px;
            font-size: 1.1rem;
            margin-top: 10px;
        }
        .btn-danger:hover { background: #dc2626; }

        .telemetry-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .stat-item {
            background: var(--bg-body);
            padding: 10px;
            border-radius: 6px;
            text-align: center;
        }

        .stat-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--accent);
            font-family: monospace;
        }

        .log-window {
            background: #000;
            height: 150px;
            overflow-y: auto;
            padding: 10px;
            font-family: 'Courier New', monospace;
            font-size: 0.8rem;
            border-radius: 4px;
            border: 1px solid #333;
        }

        .log-entry { margin-bottom: 5px; }
        .log-info { color: #4ade80; }
        .log-warn { color: #facc15; }
        .log-error { color: #f87171; }

        @media (max-width: 900px) {
            main { grid-template-columns: 1fr; }
            .video-container { aspect-ratio: 16/9; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">
            <span>🤖</span>
            <span>HiveMQ Multi-Agent Control</span>
        </div>
        <div class="status-indicator">
            <div id="statusDot" class="dot"></div>
            <span id="statusText">Disconnected</span>
        </div>
    </header>

    <main>
        <section class="video-section">
            <div class="video-container">
                <img id="streamView" src="" alt="Awaiting Robot Link..."/>
                <div class="video-overlay">LIVE FEED | 640x480 | RTSP Link</div>
            </div>
        </section>

        <aside class="controls-panel">
            <div class="card">
                <h3>System Link</h3>
                <div class="input-group">
                    <input type="text" id="robotIp" placeholder="e.g., 192.168.1.50">
                    <button id="connectBtn" class="btn-primary" onclick="connectRobot()">Connect</button>
                </div>
            </div>

            <div class="card">
                <h3>Target Acquisition</h3>
                <div class="input-group">
                    <input type="text" id="targetDesc" placeholder="e.g., Person in red shirt...">
                    <button id="lockBtn" class="btn-primary" onclick="updateTarget()" disabled>Lock</button>
                </div>
                <div id="targetStatus" style="font-size: 0.85rem; color: var(--text-muted); margin-top: 10px; word-break: break-all;">
                    Connect to robot to begin tracking.
                </div>
                <button class="btn-danger" onclick="emergencyStop()">⚠️ EMERGENCY STOP</button>
            </div>

            <div class="card">
                <h3>Telemetry</h3>
                <div class="telemetry-grid">
                    <div class="stat-item">
                        <div class="stat-label">Battery</div>
                        <div class="stat-value" id="batVal">85%</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">Speed</div>
                        <div class="stat-value" id="speedVal">0.0 m/s</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">Distance</div>
                        <div class="stat-value" id="distVal">-- m</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">CPU Load</div>
                        <div class="stat-value" id="cpuVal">12%</div>
                    </div>
                </div>
            </div>

            <div class="card">
                <h3>System Logs</h3>
                <div id="logWindow" class="log-window">
                    <div class="log-entry log-info">[SYSTEM] Ready. Connect to robot IP.</div>
                </div>
            </div>
        </aside>
    </main>

    <script>
        const logWindow = document.getElementById('logWindow');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const lockBtn = document.getElementById('lockBtn');
        const connectBtn = document.getElementById('connectBtn');
        const streamView = document.getElementById('streamView');

        function addLog(message, type = 'info') {
            const entry = document.createElement('div');
            entry.className = `log-entry log-${type}`;
            const time = new Date().toLocaleTimeString();
            entry.innerText = `[${time}] ${message}`;
            logWindow.appendChild(entry);
            logWindow.scrollTop = logWindow.scrollHeight;
        }

        // --- Hooking up the RTSP Video Backend Feed ---
        async function connectRobot() {
            const ip = document.getElementById('robotIp').value;
            if(!ip) {
                addLog("Please enter the Robot's IP address.", "warn");
                return;
            }

            connectBtn.disabled = true;
            addLog(`Requesting backend to lock RTSP stream: rtsp://${ip}:554/mjpeg/1`, "info");

            try {
                const res = await fetch('/connect-rtsp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ ip_address: ip })
                });
                const data = await res.json();
                
                if (data.status === "connected") {
                    // Force the img tag to point to our FastAPI live frame-forward stream loop
                    streamView.src = `/video-feed?token=${Math.random()}`;
                    statusDot.className = 'dot connected';
                    statusText.innerText = 'Connected';
                    lockBtn.disabled = false;
                    document.getElementById('targetStatus').innerText = "System online. Standing by for target profile...";
                    addLog("RTSP Stream attached and parsing frame chunks.", "info");
                } else {
                    throw new Error("Target connection dropped");
                }
            } catch(e) {
                addLog("Failed to link RTSP feed. Verify Robot IP and port 554.", "error");
                connectBtn.disabled = false;
            }
        }

        // --- Target Extraction Action Loop ---
        async function updateTarget() {
            const desc = document.getElementById('targetDesc').value;
            if(!desc) {
                addLog("Target string input required.", "warn");
                return;
            }

            lockBtn.disabled = true;
            lockBtn.innerText = "Locking...";
            statusDot.className = 'dot locking';
            statusText.innerText = 'Acquiring Target...';
            addLog(`Orchestrator building profile signature for: "${desc}"`, "info");

            try {
                const res = await fetch('/set-target', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ description: desc })
                });
                const data = await res.json();
                
                document.getElementById('targetStatus').innerText = `Tracking Profile: ${jsonToString(data.profile)}`;
                document.getElementById('targetStatus').style.color = "var(--text-main)";
                statusDot.className = 'dot connected';
                statusText.innerText = 'Tracking Target';
                addLog("Groq tracking models fully engaged.", "info");
                
            } catch (e) {
                addLog("Failed to register target matrices with backend.", "error");
                statusDot.className = 'dot connected';
                statusText.innerText = 'Connected';
            } finally {
                lockBtn.disabled = false;
                lockBtn.innerText = "Lock";
            }
        }

        function jsonToString(obj) {
            return Object.entries(obj).map(([k, v]) => `${k}: ${v}`).join(', ');
        }

        // --- Operational Emergency Signal Handling ---
        async function emergencyStop() {
            addLog("!!! OVERRIDE DETECTED: TERMINATING WHEEL DRIVES !!!", "error");
            document.getElementById('targetStatus').innerText = "EMERGENCY RESTRAINT INTERCEPT SYSTEM ACTIVE.";
            document.getElementById('targetStatus').style.color = "var(--danger)";
            
            try {
                await fetch('/emergency-stop', { method: 'POST' });
                addLog("Halt frames broadcast successfully to HiveMQ broker.", "warn");
            } catch (e) {
                addLog("Critical failure: Could not deliver halt instructions to HiveMQ cloud pipeline!", "error");
            }
        }

        function updateTelemetry() {
            document.getElementById('batVal').innerText = `${Math.floor(82 + Math.random() * 10)}%`;
            document.getElementById('speedVal').innerText = statusText.innerText === 'Tracking Target' ? `${(0.5 + Math.random() * 0.8).toFixed(1)} m/s` : '0.0 m/s';
            document.getElementById('distVal').innerText = statusText.innerText === 'Tracking Target' ? `${(1.2 + Math.random() * 3).toFixed(1)} m` : '-- m';
            document.getElementById('cpuVal').innerText = `${Math.floor(15 + Math.random() * 20)}%`;
        }
        setInterval(updateTelemetry, 2000);
    </script>
</body>
</html>
